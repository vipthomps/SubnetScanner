services:
  watchyourlan-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: watchyourlan_dashboard
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      - NODE_ENV=production
    # Adjust resource limits if deploying in constrained environments
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
