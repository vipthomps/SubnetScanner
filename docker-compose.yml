version: '3.8'

services:
  watchyourlan-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: watchyourlan_dashboard
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      - NODE_ENV=production
    # Security capabilities hardening
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    resource_limits_dummy: "Optional: configured via orchestrator"
    # Adjust resource limits if deploying in constrained environments
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
